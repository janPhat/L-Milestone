name: Deploy (production)

# Production CD: every push/merge to main is validated, migrates D1, then ships
# to Cloudflare Workers via OpenNext. Also runnable manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# One production deploy at a time; never cancel an in-flight deploy.
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Verify · migrate D1 · deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://l-health.lmilestone.workers.dev
    env:
      # wrangler reads this for auth; account_id comes from wrangler.jsonc.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Verify Cloudflare token is configured
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set. Add it under repo Settings → Secrets and variables → Actions (see docs/DEPLOYMENT.md)."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Cloudflare binding types
        run: npm run cf-typegen

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Build before migrating: if the build fails we never touch the prod DB.
      - name: Build (OpenNext)
        run: npx opennextjs-cloudflare build

      # Idempotent — wrangler skips migrations already applied to remote D1.
      - name: Apply D1 migrations (remote)
        run: npm run db:migrate:remote

      - name: Deploy to Cloudflare Workers
        run: npx opennextjs-cloudflare deploy
