name: CI

# Runs on every PR into main and every push to a non-main branch.
# No Cloudflare credentials are used here, so it is safe for fork PRs.
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # cloudflare-env.d.ts is committed (it types secrets from .dev.vars, which
      # is absent in CI) — do NOT regenerate it here or those types are lost.
      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Full OpenNext production build — catches build-only breakage. No deploy,
      # no credentials.
      - name: Build (OpenNext)
        run: npx opennextjs-cloudflare build
